# nginx reverse proxy for tsong. Install to /etc/nginx/sites-available/tsong
# and symlink into sites-enabled. Terminates TLS (via certbot) and forwards
# both normal HTTP and the /ws WebSocket upgrade to the Node server on :3000.
#
# Run `certbot --nginx -d your-domain.com` after this is in place; certbot
# rewrites this file to add the listen 443 / ssl_certificate lines for you.

server {
    listen 80;
    server_name your-domain.com;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # These three lines are what make WebSockets (the /ws path) work.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Don't let nginx time out idle game sockets after the default 60s.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
