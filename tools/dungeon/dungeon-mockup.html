<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TSONG Dungeon — Lit B1 Mockup</title>
<style>
  * { margin:0; box-sizing:border-box; }
  html,body { height:100%; background:#000; overflow:hidden;
              font:13px/1.4 ui-monospace,Menlo,Consolas,monospace; color:#cdc6dc; }
  #cv { display:block; image-rendering:pixelated; width:100vw; height:100vh; }
  #hud { position:fixed; top:12px; left:12px; background:#0c0a12cc; border:1px solid #2a2435;
         border-radius:8px; padding:10px 13px; max-width:300px; }
  #hud h1 { font-size:14px; color:#e0863e; letter-spacing:.5px; margin-bottom:4px; }
  #hud .k { color:#c9a227; } #hud .m { color:#8a82a0; }
  kbd { background:#241d12; border:1px solid #342d45; border-radius:4px; padding:0 5px; color:#e8e2f0; }
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div id="hud">
  <h1>TSONG RUINS — B1 · "The Threshold"</h1>
  <div class="m">Overgrown ruins — varied cracked stone (baked-in detail), torchlight. <b>Look target.</b></div>
  <div style="margin-top:7px">
    <kbd>WASD</kbd>/<kbd>↑↓←→</kbd> walk · <kbd>L</kbd> <span id="lstate">lighting: ON</span>
  </div>
  <div class="m" id="note" style="margin-top:6px"></div>
</div>

<script src="floors.js"></script>
<script>
const TS = 16;                 // source tile size
const cv = document.getElementById('cv'), ctx = cv.getContext('2d');
const floor = window.DUNGEON_FLOORS.find(f => f.id === 'B1');
const grid = floor.rows;
const COLS = Math.max(...grid.map(r => r.length)), ROWS = grid.length;
const at = (x, y) => (grid[y] && grid[y][x]) || ' ';
const WALK = new Set(['.', '~', 'c', '$', 'K', '>', '<', '@', 'D', '+', '^']);
const isWall = (x, y) => { const c = at(x, y); return c === '#' || c === 'T' || c === 'o' || c === ' '; };

// ── assets ──
const A = {};
function load(name, src) { return new Promise(r => { const i = new Image(); i.onload = () => { A[name] = i; r(); }; i.src = src; }); }
// warm a tile toward amber so walls read distinct from the cooler floor. Uses compositing
// (multiply) rather than getImageData, which throws a security error on file:// images.
function tintWarm(img, amber) {
  const c = document.createElement('canvas'); c.width = img.width; c.height = img.height;
  const x = c.getContext('2d'); x.imageSmoothingEnabled = false;
  x.drawImage(img, 0, 0);
  x.globalCompositeOperation = 'multiply'; x.fillStyle = amber; x.fillRect(0, 0, c.width, c.height);
  x.globalCompositeOperation = 'destination-in'; x.drawImage(img, 0, 0); // clip back to sprite alpha
  return c;
}

let S = 3, offX = 0, offY = 0; // scale + centering offset (set in fit())
// MOCKUP ONLY: fit the WHOLE floor in view so we can eyeball the full layout while designing.
// In the REAL build the dungeon uses the World camera — zoomed in + following the player, so you
// only ever see the area around you (discovery/fog), never the whole map at once.
function fit() {
  S = Math.max(2, Math.floor(Math.min(window.innerWidth / (COLS * TS), window.innerHeight / (ROWS * TS))));
  cv.width = window.innerWidth; cv.height = window.innerHeight;
  offX = Math.floor((cv.width - COLS * TS * S) / 2);
  offY = Math.floor((cv.height - ROWS * TS * S) / 2);
}
addEventListener('resize', fit);

// player center (FLOAT tile coords) + torches. Float coords give smooth analog movement
// like the World engine, instead of choppy tile-hops.
let px = 1.5, py = 1.5;
const torches = [];
for (let y = 0; y < ROWS; y++) for (let x = 0; x < COLS; x++) {
  if (at(x, y) === 'T') torches.push({ x, y, ph: Math.random() * 6.28 });
  if (at(x, y) === '@') { px = x + 0.5; py = y + 0.5; }
}
let lighting = true;

// ── drawing helpers (dest pixels) ──
function dpx(gx) { return offX + gx * TS * S; }
function dpy(gy) { return offY + gy * TS * S; }
function tile(img, gx, gy) { ctx.drawImage(img, dpx(gx), dpy(gy), TS * S, TS * S); }

// little hand-drawn markers for things the tileset doesn't give us
function stairs(gx, gy, down) {
  const x = dpx(gx), y = dpy(gy), w = TS * S;
  ctx.fillStyle = '#0a0810'; ctx.fillRect(x + w * .12, y + w * .12, w * .76, w * .76);
  ctx.fillStyle = down ? '#2a2030' : '#3a3450';
  for (let i = 0; i < 4; i++) {
    const t = i / 4;
    ctx.fillRect(x + w * .12, y + w * (down ? .18 + t * .6 : .66 - t * .6), w * .76, w * .1);
  }
  ctx.fillStyle = '#c9a227'; ctx.font = `bold ${Math.floor(w * .5)}px monospace`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(down ? '▼' : '▲', x + w / 2, y + w / 2);
}
function door(gx, gy) {
  const x = dpx(gx), y = dpy(gy), w = TS * S;
  ctx.fillStyle = '#5a3a1e'; ctx.fillRect(x + w * .18, y + w * .08, w * .64, w * .84);
  ctx.strokeStyle = '#3a2410'; ctx.lineWidth = Math.max(1, S);
  ctx.strokeRect(x + w * .18, y + w * .08, w * .64, w * .84);
  ctx.fillStyle = '#c9a227'; ctx.beginPath();
  ctx.arc(x + w * .68, y + w * .5, Math.max(1.5, S * .9), 0, 7); ctx.fill();
}
const AVATAR_TINT = '#5ad1c0'; // your World avatar color (the tsong ball is tinted per-player)
function avatar(fx, fy) {            // fx,fy are FLOAT tile-center coords
  const w = TS * S, cx = offX + fx * TS * S, cy = offY + fy * TS * S, r = w * .34;
  // the World avatar: a round tsong ball with two dark eyes, tinted to the player color
  ctx.fillStyle = 'rgba(0,0,0,0.32)'; ctx.beginPath();        // soft round shadow
  ctx.ellipse(cx, cy + w * .36, w * .3, w * .1, 0, 0, 7); ctx.fill();
  ctx.fillStyle = AVATAR_TINT; ctx.beginPath();               // round body
  ctx.arc(cx, cy, r, 0, 7); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.35)'; ctx.beginPath();   // tiny highlight for roundness
  ctx.arc(cx - r * .3, cy - r * .35, r * .28, 0, 7); ctx.fill();
  ctx.fillStyle = '#1a1a1a';                                   // two dark eyes
  ctx.fillRect(cx - r * .42, cy - r * .25, Math.max(1, S * .8), S * 1.6);
  ctx.fillRect(cx + r * .12, cy - r * .25, Math.max(1, S * .8), S * 1.6);
}

// ── deterministic per-tile noise ──
function frnd(x, y, s) { const n = Math.sin(x * 12.9898 + y * 78.233 + s * 3.17) * 43758.5453; return n - Math.floor(n); }
// blit one 16×16 tile [col,row] from a sheet to dest (size px square)
function blit(sheet, col, row, dx, dy, size) { ctx.drawImage(sheet, col * TS, row * TS, TS, TS, dx, dy, size, size); }

// Real CC0 props hand-picked from the Ninja Adventure "abandoned village" sheet (col,row):
const PROPS = {
  bush: [[6, 3], [7, 3], [8, 3], [9, 3], [8, 5], [1, 3], [4, 11], [5, 11]], // leafy bushes
  plant: [[10, 4], [9, 4]],                                                  // small sprout clusters
  rock: [[0, 3], [2, 3], [3, 3], [10, 3]],                                   // mossy stone rubble
  vine: [[11, 6], [11, 7]],                                                  // hanging wall vines
  log: [[9, 5]],                                                             // fallen log
};
function pick(pool, gx, gy, s) { return pool[Math.floor(frnd(gx, gy, s) * pool.length) % pool.length]; }

// one soft grass blade-fan (varied)
const GRASS_COLS = ['#6f9a3e', '#5a7a32', '#7faa46', '#4f6e2c'];
function grassTuft(cx, baseY, h, col) {
  ctx.strokeStyle = col; ctx.lineWidth = Math.max(1, S * 0.5); ctx.lineCap = 'round';
  for (let b = -1; b <= 1; b++) {
    ctx.beginPath(); ctx.moveTo(cx + b * S * 1.0, baseY);
    ctx.quadraticCurveTo(cx + b * S * 1.0 + b * S, baseY - h * 0.6, cx + b * S * 1.7, baseY - h);
    ctx.stroke();
  }
}
// a clump of a few varied blades (different shades/heights) — looks organic, not uniform
function grassClump(cx, baseY, spread, gx, gy, dense) {
  const n = (dense ? 3 : 2) + Math.floor(frnd(gx, gy, 12) * 2);
  for (let i = 0; i < n; i++) {
    const off = (frnd(gx, gy, i + 13) - 0.5) * spread;
    const h = (TS * S) * (0.24 + 0.30 * frnd(gx, gy, i + 17));
    grassTuft(cx + off, baseY, h, GRASS_COLS[Math.floor(frnd(gx, gy, i + 19) * GRASS_COLS.length)]);
  }
}
// ground: random stone variant per tile — cracks/rubble/grass are baked into the ART, so the
// floor has real character (and no flat-tiled repeat) even under the dark lighting.
function ground(gx, gy) {
  const r = frnd(gx, gy, 70);
  const img = r < 0.55 ? A.f0 : r < 0.66 ? A.f1 : r < 0.76 ? A.f2 : r < 0.85 ? A.f3
    : r < 0.92 ? A.f4 : r < 0.965 ? A.f6 /* grass-through-stone */ : A.f5 /* rubble */;
  tile(img, gx, gy);
}
function wallTile(gx, gy) {
  const r = frnd(gx, gy, 71);
  tile(r < 0.5 ? A.w0 : r < 0.74 ? A.w1 : r < 0.9 ? A.w2 : A.w3, gx, gy);
}
// floor decor is now just grass tufts hugging wall bases (cracks/moss live in the tiles)
function floorDecor(gx, gy) {
  const w = TS * S, x = dpx(gx), y = dpy(gy);
  const wl = isWall(gx - 1, gy), wr = isWall(gx + 1, gy), wu = isWall(gx, gy - 1), wd = isWall(gx, gy + 1);
  const nearWall = wl || wr || wu || wd;
  if (nearWall ? frnd(gx, gy, 99) > 0.72 : frnd(gx, gy, 99) > 0.95) {
    let cx = x + w * 0.5, by = y + w * 0.82;
    if (wd) by = y + w * 0.96; if (wl) cx = x + w * 0.22; else if (wr) cx = x + w * 0.78;
    grassClump(cx, by, w * 0.5, gx, gy, nearWall);
  }
}
// encounter patches: thick, tall, varied grass (Pokémon tall grass you can get ambushed in)
function tallGrass(gx, gy) {
  const w = TS * S, x = dpx(gx), y = dpy(gy);
  ctx.fillStyle = 'rgba(28,52,26,0.36)'; ctx.fillRect(x, y, w, w);
  for (let i = 0; i < 3; i++) grassClump(x + w * (0.22 + 0.55 * frnd(gx, gy, i)), y + w * (0.86 + 0.1 * frnd(gx, gy, i + 3)), w * 0.7, gx * 7 + i, gy * 3 + 5, true);
}
// walls: the brick variants already carry the damage/moss — just an occasional hanging vine
function wallDecor(gx, gy) {
  if (frnd(gx, gy, 8) <= 0.8) return;
  const w = TS * S, x = dpx(gx), y = dpy(gy);
  ctx.strokeStyle = '#4a6a2e'; ctx.lineWidth = Math.max(1, S * 0.7);
  const vx = x + w * (0.2 + 0.6 * frnd(gx, gy, 9));
  ctx.beginPath(); ctx.moveTo(vx, y); ctx.quadraticCurveTo(vx + S, y + w * 0.5, vx, y + w * 0.92); ctx.stroke();
  ctx.fillStyle = '#5a8a34';
  for (let k = 1; k <= 2; k++) { const ly = y + w * 0.3 * k; ctx.beginPath(); ctx.ellipse(vx + (k % 2 ? S : -S), ly, S * 1.1, S * 0.6, 0, 0, 7); ctx.fill(); }
}

// ── cobwebs: faint webs tucked into floor tiles that sit in a wall corner ──
function cobweb(x, y, w, sx, sy) {
  const ox = sx < 0 ? x + w : x, oy = sy < 0 ? y + w : y, R = w * 0.52;
  ctx.strokeStyle = 'rgba(225,228,235,0.30)'; ctx.lineWidth = Math.max(1, S * 0.3); ctx.lineCap = 'round';
  const ang = [0, Math.PI / 6, Math.PI / 3, Math.PI / 2];
  const pt = (a, rr) => [ox + sx * Math.cos(a) * rr, oy + sy * Math.sin(a) * rr];
  for (const a of ang) { const [ex, ey] = pt(a, R); ctx.beginPath(); ctx.moveTo(ox, oy); ctx.lineTo(ex, ey); ctx.stroke(); }
  for (const rr of [R * 0.42, R * 0.78]) {
    ctx.beginPath();
    ang.forEach((a, i) => { const [ex, ey] = pt(a, rr); i ? ctx.lineTo(ex, ey) : ctx.moveTo(ex, ey); });
    ctx.stroke();
  }
}
function maybeCobweb(gx, gy) {
  if (frnd(gx, gy, 55) <= 0.86) return;               // sparse
  const wl = isWall(gx - 1, gy), wr = isWall(gx + 1, gy), wu = isWall(gx, gy - 1), wd = isWall(gx, gy + 1);
  const x = dpx(gx), y = dpy(gy), w = TS * S;
  if (wu && wl) cobweb(x, y, w, 1, 1);
  else if (wu && wr) cobweb(x, y, w, -1, 1);
  else if (wd && wl) cobweb(x, y, w, 1, -1);
  else if (wd && wr) cobweb(x, y, w, -1, -1);
}

// ── fireflies: a few drifting, twinkling lights in red / orange / purple ──
const FIRE_COLORS = [[255, 90, 80], [255, 160, 60], [200, 110, 255]];
const fireflies = [];
function initFireflies() {
  const mapW = COLS * TS * S, mapH = ROWS * TS * S;
  for (let i = 0; i < 11; i++) fireflies.push({
    x: offX + Math.random() * mapW, y: offY + Math.random() * mapH,
    vx: (Math.random() * 2 - 1) * 12, vy: (Math.random() * 2 - 1) * 12,
    col: FIRE_COLORS[i % FIRE_COLORS.length], ph: Math.random() * 6.28,
  });
}
function drawFireflies(dt) {
  const mapW = COLS * TS * S, mapH = ROWS * TS * S, t = performance.now() / 1000;
  ctx.save(); ctx.globalCompositeOperation = 'lighter';
  for (const f of fireflies) {
    f.vx += (Math.random() * 2 - 1) * 9 * dt; f.vy += (Math.random() * 2 - 1) * 9 * dt;
    f.vx = Math.max(-16, Math.min(16, f.vx)); f.vy = Math.max(-16, Math.min(16, f.vy));
    f.x += f.vx * dt; f.y += f.vy * dt;
    if (f.x < offX || f.x > offX + mapW) f.vx *= -1;
    if (f.y < offY || f.y > offY + mapH) f.vy *= -1;
    f.x = Math.max(offX, Math.min(offX + mapW, f.x)); f.y = Math.max(offY, Math.min(offY + mapH, f.y));
    const tw = 0.4 + 0.6 * Math.max(0, Math.sin(t * 2.1 + f.ph));
    const [r, g, b] = f.col, R = S * 5;
    const grd = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, R);
    grd.addColorStop(0, `rgba(${r},${g},${b},${0.5 * tw})`); grd.addColorStop(1, `rgba(${r},${g},${b},0)`);
    ctx.fillStyle = grd; ctx.beginPath(); ctx.arc(f.x, f.y, R, 0, 7); ctx.fill();
    ctx.fillStyle = `rgba(255,255,255,${0.7 * tw})`; ctx.beginPath(); ctx.arc(f.x, f.y, Math.max(1, S * 0.45), 0, 7); ctx.fill();
  }
  ctx.restore();
}

function drawScene() {
  ctx.imageSmoothingEnabled = false;
  ctx.fillStyle = '#0a0f0a'; ctx.fillRect(0, 0, cv.width, cv.height);
  for (let y = 0; y < ROWS; y++) for (let x = 0; x < COLS; x++) {
    const c = at(x, y);
    if (c === ' ') continue;
    if (isWall(x, y)) { wallTile(x, y); wallDecor(x, y); }
    else {
      ground(x, y);
      if (c === '~') tallGrass(x, y);
      else if (c === 'c') tile(A.chest, x, y);
      else if (c === '>') stairs(x, y, true);
      else if (c === '<') stairs(x, y, false);
      else if (c === 'D' || c === '+') door(x, y);
      else floorDecor(x, y);
      maybeCobweb(x, y);
    }
  }
  avatar(px, py);
}

// ── lighting: warm pools (additive) + an ambient darkness overlay carved by lights ──
const lm = document.createElement('canvas'), lmx = lm.getContext('2d');
function flicker(ph) { const t = performance.now() / 1000; return 0.82 + 0.18 * Math.sin(t * 11 + ph) * Math.sin(t * 7.3 + ph * 1.7); }

function lights() {
  const w = TS * S;
  const list = torches.map(tr => ({
    x: dpx(tr.x) + w / 2, y: dpy(tr.y) + w * .55, r: w * 3.6 * flicker(tr.ph),
    warm: 'rgba(255,170,70,', amb: 'rgba(255,150,60,' }));
  list.push({ x: offX + px * TS * S, y: offY + py * TS * S, r: w * 3.3, warm: 'rgba(190,210,255,', amb: 'rgba(180,200,255,' });

  // 1) additive warm glow on the scene
  ctx.save(); ctx.globalCompositeOperation = 'lighter';
  for (const L of list) {
    const g = ctx.createRadialGradient(L.x, L.y, 0, L.x, L.y, L.r);
    g.addColorStop(0, L.amb + '0.55)'); g.addColorStop(.5, L.amb + '0.12)'); g.addColorStop(1, L.amb + '0)');
    ctx.fillStyle = g; ctx.fillRect(0, 0, cv.width, cv.height);
  }
  ctx.restore();

  // 2) darkness overlay with lit holes punched out
  lm.width = cv.width; lm.height = cv.height;
  lmx.clearRect(0, 0, lm.width, lm.height);
  lmx.fillStyle = 'rgba(11,16,11,0.74)'; lmx.fillRect(0, 0, lm.width, lm.height); // lighter, greener dark
  lmx.globalCompositeOperation = 'destination-out';
  for (const L of list) {
    const g = lmx.createRadialGradient(L.x, L.y, 0, L.x, L.y, L.r);
    g.addColorStop(0, 'rgba(0,0,0,1)'); g.addColorStop(.45, 'rgba(0,0,0,0.92)');
    g.addColorStop(.8, 'rgba(0,0,0,0.32)'); g.addColorStop(1, 'rgba(0,0,0,0)');
    lmx.fillStyle = g; lmx.fillRect(0, 0, lm.width, lm.height);
  }
  lmx.globalCompositeOperation = 'source-over';
  ctx.drawImage(lm, 0, 0);

  // 3) flames drawn bright on top of the darkness
  for (const tr of torches) {
    const x = dpx(tr.x) + w / 2, y = dpy(tr.y) + w * .5, f = flicker(tr.ph);
    ctx.fillStyle = 'rgba(60,40,20,1)'; ctx.fillRect(x - S, y + S, 2 * S, 3 * S);       // bracket
    const fg = ctx.createRadialGradient(x, y - S, 0, x, y - S, w * .42 * f);
    fg.addColorStop(0, '#fff7d0'); fg.addColorStop(.4, '#ffb23a'); fg.addColorStop(1, 'rgba(255,80,0,0)');
    ctx.fillStyle = fg; ctx.beginPath();
    ctx.ellipse(x, y - S * 1.4, w * .14 * f, w * .26 * f, 0, 0, 7); ctx.fill();
  }
}

// ── smooth analog movement (WASD + arrows + held keys), like the World engine ──
const keys = new Set();
const DIRS = {
  ArrowUp: [0, -1], ArrowDown: [0, 1], ArrowLeft: [-1, 0], ArrowRight: [1, 0],
  w: [0, -1], s: [0, 1], a: [-1, 0], d: [1, 0],
};
addEventListener('keydown', (e) => {
  const k = e.key.length === 1 ? e.key.toLowerCase() : e.key;
  if (k === 'l') { lighting = !lighting; document.getElementById('lstate').textContent = 'lighting: ' + (lighting ? 'ON' : 'OFF'); return; }
  if (DIRS[k]) { keys.add(k); e.preventDefault(); }
});
addEventListener('keyup', (e) => keys.delete(e.key.length === 1 ? e.key.toLowerCase() : e.key));
addEventListener('blur', () => keys.clear());

const SPEED = 5.5; // tiles/sec
function canMove(cx, cy) {
  const rad = 0.30;
  for (const ox of [-rad, rad]) for (const oy of [-rad, rad])
    if (isWall(Math.floor(cx + ox), Math.floor(cy + oy))) return false;
  return true;
}
let lastNote = '';
function updateNote() {
  const c = at(Math.floor(px), Math.floor(py));
  let n = '';
  if (c === '~') n = '🌿 overgrown encounter patch — a battle could trigger here';
  else if (c === 'c') n = '📦 a chest! (150–300🪙 + a chance at an item)';
  else if (c === '>') n = '▼ stairs down to B2';
  if (n !== lastNote) { document.getElementById('note').textContent = n; lastNote = n; }
}
function update(dt) {
  let vx = 0, vy = 0;
  for (const k of keys) { const d = DIRS[k]; if (d) { vx += d[0]; vy += d[1]; } }
  if (!vx && !vy) return;
  const m = Math.hypot(vx, vy) || 1; vx /= m; vy /= m;
  const nx = px + vx * SPEED * dt, ny = py + vy * SPEED * dt;
  if (canMove(nx, py)) px = nx;
  if (canMove(px, ny)) py = ny;
  updateNote();
}
let last = performance.now();
function frame() {
  const now = performance.now(); const dt = Math.min(0.05, (now - last) / 1000); last = now;
  update(dt);
  drawScene();
  if (lighting) lights();
  drawFireflies(dt);
  requestAnimationFrame(frame);
}

Promise.all([
  // 0x72 (CC0): multiple stone-floor variants (cracks/rubble/grass baked into the ART) + wall
  // variants, randomized per tile — variation survives the darkness, no flat-tiled look.
  load('f0', 'assets/f0.png'), load('f1', 'assets/f1.png'), load('f2', 'assets/f2.png'),
  load('f3', 'assets/f3.png'), load('f4', 'assets/f4.png'), load('f5', 'assets/f5.png'),
  load('f6', 'assets/f6.png'),
  load('w0', 'assets/w0.png'), load('w1', 'assets/w1.png'), load('w2', 'assets/w2.png'),
  load('w3', 'assets/w3.png'),
  load('chest', 'assets/treasure_closed.png'),
]).then(() => {
  ['w0', 'w1', 'w2', 'w3'].forEach(k => A[k] = tintWarm(A[k], '#ffd49a')); // walls → amber sandstone
  fit(); initFireflies(); frame();
});
</script>
</body>
</html>
