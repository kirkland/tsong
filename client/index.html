<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>tsong — multiplayer pong</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: system-ui, sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        align-items: center;
        justify-content: center;
        gap: 24px;
        background: #060912;
        color: #e8eefc;
      }
      /* The game and its HUD stack vertically; chat sits to the right. */
      #stage {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
      }
      h1 {
        margin: 0;
        font-size: 20px;
        letter-spacing: 2px;
        color: #7da2ff;
      }
      #game {
        width: min(90vw, 800px);
        height: auto;
        aspect-ratio: 800 / 500;
        border: 1px solid #2a3550;
        border-radius: 8px;
        background: #0b1020;
        cursor: none;
      }
      #status {
        min-height: 22px;
        font-size: 18px;
        color: #cdd7f5;
      }
      #watchers {
        min-height: 18px;
        font-size: 13px;
        color: #6b7796;
      }
      button {
        font: inherit;
        padding: 8px 20px;
        border-radius: 6px;
        border: 1px solid #3a6df0;
        background: #3a6df0;
        color: white;
        cursor: pointer;
      }
      button:hover {
        background: #2f5fd6;
      }
      button.link {
        background: none;
        border: none;
        color: #6b7796;
        padding: 2px 6px;
        font-size: 13px;
        text-decoration: underline;
      }
      button.link:hover {
        background: none;
        color: #9fb0d8;
      }
      #leaderboard {
        width: min(90vw, 360px);
        font-size: 14px;
      }
      #leaderboard h2 {
        font-size: 13px;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: #7da2ff;
        text-align: center;
        margin: 8px 0 6px;
      }
      #leaderboard ol {
        list-style: none;
        margin: 0;
        padding: 0;
      }
      #leaderboard li {
        display: grid;
        grid-template-columns: 22px 1fr auto 48px;
        gap: 10px;
        align-items: baseline;
        padding: 4px 10px;
        border-radius: 4px;
      }
      #leaderboard li:nth-child(odd) {
        background: #0e1424;
      }
      #leaderboard .rank {
        color: #6b7796;
      }
      #leaderboard .rec,
      #leaderboard .pct {
        font-variant-numeric: tabular-nums;
      }
      #leaderboard .rec {
        color: #9fb0d8;
      }
      #leaderboard .pct {
        color: #7da2ff;
        text-align: right;
      }
      #chat {
        width: 300px;
        height: min(70vh, 560px);
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      #chat h2 {
        font-size: 13px;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: #7da2ff;
        text-align: center;
        margin: 0 0 2px;
      }
      #chatlog {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        background: #0e1424;
        border: 1px solid #1c2640;
        border-radius: 6px;
        padding: 8px 10px;
        font-size: 13px;
        line-height: 1.5;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      /* On narrow screens, drop the chat below the game at full width. */
      @media (max-width: 1100px) {
        #chat {
          width: min(90vw, 800px);
          height: 240px;
        }
      }
      #chatlog .chatfrom {
        color: #7da2ff;
        font-weight: 600;
      }
      #chatlog .chatfrom.tag {
        color: #e8b84b;
      }
      #chatlog .chattext {
        color: #cdd7f5;
        word-break: break-word;
      }
      #chatForm {
        display: flex;
      }
      #chatInput {
        flex: 1;
        font: inherit;
        font-size: 14px;
        padding: 8px 10px;
        border-radius: 6px;
        border: 1px solid #2a3550;
        background: #0b1020;
        color: #e8eefc;
      }
      #chatInput:disabled {
        opacity: 0.5;
      }
      #overlay {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(6, 9, 18, 0.92);
        backdrop-filter: blur(2px);
      }
      #joinForm {
        display: flex;
        flex-direction: column;
        gap: 12px;
        align-items: stretch;
        width: min(86vw, 280px);
        text-align: center;
      }
      #joinForm input {
        font: inherit;
        padding: 10px 12px;
        border-radius: 6px;
        border: 1px solid #2a3550;
        background: #0b1020;
        color: #e8eefc;
        text-align: center;
      }
      #colorPicker {
        display: flex;
        gap: 8px;
        justify-content: center;
        padding: 4px 0;
      }
      #colorPicker .swatch {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        border: 2px solid transparent;
        padding: 0;
        cursor: pointer;
        transition: border-color 0.15s;
      }
      #colorPicker .swatch:hover {
        border-color: #9fb0d8;
      }
      #colorPicker .swatch.selected {
        border-color: #e8eefc;
        box-shadow: 0 0 6px rgba(232, 238, 252, 0.4);
      }
    </style>
  </head>
  <body>
    <div id="stage">
      <h1>T S O N G</h1>
      <canvas id="game" width="800" height="500"></canvas>
      <div id="status"></div>
      <button id="join" style="display: none">Join game</button>
      <div id="watchers"></div>
      <button id="rename" class="link" style="display: none">change name</button>
      <div id="leaderboard"></div>
    </div>

    <div id="chat">
      <h2>Chat</h2>
      <div id="chatlog"></div>
      <form id="chatForm">
        <input id="chatInput" maxlength="200" placeholder="say something…" autocomplete="off" disabled />
      </form>
    </div>

    <div id="overlay">
      <form id="joinForm">
        <h1>T S O N G</h1>
        <input id="nick" maxlength="20" placeholder="enter a nickname" autocomplete="off" autofocus />
        <div id="colorPicker">
          <button class="swatch selected" data-color="#e8eefc" style="background:#e8eefc" type="button"></button>
          <button class="swatch" data-color="#ff6b6b" style="background:#ff6b6b" type="button"></button>
          <button class="swatch" data-color="#51cf66" style="background:#51cf66" type="button"></button>
          <button class="swatch" data-color="#339af0" style="background:#339af0" type="button"></button>
          <button class="swatch" data-color="#fcc419" style="background:#fcc419" type="button"></button>
          <button class="swatch" data-color="#cc5de8" style="background:#cc5de8" type="button"></button>
          <button class="swatch" data-color="#ff922b" style="background:#ff922b" type="button"></button>
          <button class="swatch" data-color="#20c997" style="background:#20c997" type="button"></button>
        </div>
        <button type="submit">Enter</button>
      </form>
    </div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
