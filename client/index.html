<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>tsong — multiplayer pong</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: system-ui, sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        background: #060912;
        color: #e8eefc;
      }
      /* Game column on the left, chat on the right, tops aligned to the board. */
      .arena {
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        align-items: flex-start;
        justify-content: center;
        gap: 24px;
      }
      /* The game and its HUD stack vertically. */
      #stage {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
      }
      h1 {
        margin: 0;
        font-size: 20px;
        letter-spacing: 2px;
        color: #7da2ff;
      }
      #game {
        width: min(90vw, 800px);
        height: auto;
        aspect-ratio: 800 / 500;
        border: 1px solid #2a3550;
        border-radius: 8px;
        background: #0b1020;
        cursor: none;
      }
      #status {
        min-height: 22px;
        font-size: 18px;
        color: #cdd7f5;
      }
      #watchers {
        min-height: 18px;
        font-size: 13px;
        color: #6b7796;
      }
      #modeToggle {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 13px;
        color: #9fb0d8;
        cursor: pointer;
        user-select: none;
      }
      #modeToggle:has(input:disabled) {
        opacity: 0.5;
        cursor: default;
      }
      #modeToggle input {
        accent-color: #3a6df0;
        cursor: inherit;
      }
      button {
        font: inherit;
        padding: 8px 20px;
        border-radius: 6px;
        border: 1px solid #3a6df0;
        background: #3a6df0;
        color: white;
        cursor: pointer;
      }
      button:hover {
        background: #2f5fd6;
      }
      button.link {
        background: none;
        border: none;
        color: #6b7796;
        padding: 2px 6px;
        font-size: 13px;
        text-decoration: underline;
      }
      button.link:hover {
        background: none;
        color: #9fb0d8;
      }
      #leaderboard {
        width: min(90vw, 360px);
        font-size: 14px;
      }
      #leaderboard h2 {
        font-size: 13px;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: #7da2ff;
        text-align: center;
        margin: 8px 0 6px;
      }
      #leaderboard ol {
        list-style: none;
        margin: 0;
        padding: 0;
      }
      #leaderboard li {
        display: grid;
        grid-template-columns: 22px 1fr auto 48px;
        gap: 10px;
        align-items: baseline;
        padding: 4px 10px;
        border-radius: 4px;
      }
      #leaderboard li:nth-child(odd) {
        background: #0e1424;
      }
      #leaderboard .rank {
        color: #6b7796;
      }
      #leaderboard .rec,
      #leaderboard .pct {
        font-variant-numeric: tabular-nums;
      }
      #leaderboard .rec {
        color: #9fb0d8;
      }
      #leaderboard .pct {
        color: #7da2ff;
        text-align: right;
      }
      #chat {
        width: 300px;
        /* Match the canvas height (width min(90vw,800px) at a 800/500 ratio) so the
           chat box lines up top-and-bottom with the playing field. */
        height: min(56.25vw, 500px);
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      #chat h2 {
        font-size: 13px;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: #7da2ff;
        text-align: center;
        margin: 0 0 2px;
      }
      #chatlog {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        background: #0e1424;
        border: 1px solid #1c2640;
        border-radius: 6px;
        padding: 8px 10px;
        font-size: 13px;
        line-height: 1.5;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      /* On narrow screens, drop the chat below the game at full width. */
      @media (max-width: 1100px) {
        #chat {
          width: min(90vw, 800px);
          height: 240px;
        }
      }
      #chatlog .chatfrom {
        color: #7da2ff;
        font-weight: 600;
      }
      #chatlog .chatfrom.tag {
        color: #e8b84b;
      }
      #chatlog .chattext {
        color: #cdd7f5;
        word-break: break-word;
      }
      #chatForm {
        display: flex;
      }
      #chatInput {
        flex: 1;
        font: inherit;
        font-size: 14px;
        padding: 8px 10px;
        border-radius: 6px;
        border: 1px solid #2a3550;
        background: #0b1020;
        color: #e8eefc;
      }
      #chatInput:disabled {
        opacity: 0.5;
      }
      /* Two fixed 9-column rows under the chat — defaults and recently-used — so
         both rows are exactly the same width regardless of how many recents exist. */
      #reactions,
      #recentReactions {
        display: grid;
        grid-template-columns: repeat(9, 28px);
        gap: 5px;
        justify-content: center;
      }
      .reaction-btn {
        box-sizing: border-box;
        width: 28px;
        height: 28px;
        padding: 0;
        border-radius: 50%;
        border: 1px solid #2a3550;
        background: #0e1424;
        font-size: 16px;
        line-height: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: transform 0.1s ease, background 0.15s;
      }
      /* Empty recently-used slot: a faint placeholder that holds the row's shape. */
      .recent-slot {
        box-sizing: border-box;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: 1px dashed #1c2640;
      }
      .reaction-btn:hover {
        background: #18203a;
        transform: scale(1.15);
      }
      .reaction-btn:active {
        transform: scale(0.92);
      }
      .reaction-btn:disabled {
        opacity: 0.5;
        cursor: default;
        transform: none;
      }
      /* The "more emojis" arrow uses the same circle; just a smaller glyph. */
      .reaction-btn.more {
        font-size: 11px;
        color: #9fb0d8;
      }
      /* Slack-style emoji picker, popped above the reaction bar. */
      #emojiPicker {
        position: absolute;
        bottom: calc(100% + 8px);
        left: 50%;
        transform: translateX(-50%);
        width: min(92vw, 300px);
        max-height: 320px;
        display: flex;
        flex-direction: column;
        background: #0e1424;
        border: 1px solid #2a3550;
        border-radius: 8px;
        box-shadow: 0 10px 28px rgba(0, 0, 0, 0.55);
        overflow: hidden;
        z-index: 60;
      }
      #emojiPicker[hidden] {
        display: none;
      }
      #emojiSearch {
        margin: 8px;
        padding: 7px 10px;
        font: inherit;
        font-size: 14px;
        border-radius: 6px;
        border: 1px solid #2a3550;
        background: #0b1020;
        color: #e8eefc;
      }
      #emojiGrid {
        overflow-y: auto;
        padding: 0 6px 8px;
      }
      .emoji-cat-label {
        position: sticky;
        top: 0;
        background: #0e1424;
        font-size: 11px;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: #6b7796;
        padding: 6px 4px 3px;
      }
      .emoji-cat-grid {
        display: grid;
        grid-template-columns: repeat(8, 1fr);
        gap: 1px;
      }
      .emoji-cell {
        border: none;
        background: none;
        padding: 3px 0;
        font-size: 20px;
        line-height: 1.2;
        border-radius: 4px;
        cursor: pointer;
      }
      .emoji-cell:hover {
        background: #18203a;
      }
      .emoji-empty {
        padding: 16px;
        text-align: center;
        font-size: 13px;
        color: #6b7796;
      }
      .emoji-loading {
        padding: 16px;
        text-align: center;
        font-size: 13px;
        color: #6b7796;
      }
      /* Bottom row: the "more emojis" picker and the pong-ball reaction, centered
         and set apart by a divider. position: relative anchors the picker popup. */
      #ballReaction {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 5px;
        margin-top: 4px;
        padding-top: 10px;
        border-top: 1px solid #1c2640;
      }
      /* The dot inside the ball button: a flat disc in the live ball color,
         matching how the ball is drawn on the canvas (a plain filled circle).
         --ball-color tracks the game state. */
      .ball-dot {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: var(--ball-color, #e8eefc);
      }
      /* Full-screen layer the floating emojis drift through; never eats clicks. */
      #reactionLayer {
        position: fixed;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
        z-index: 50;
      }
      /* Big transient center-screen banner (e.g. a forfeit callout). */
      .announce-banner {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: max-content;
        max-width: 90vw;
        text-align: center;
        font-size: clamp(28px, 6vw, 64px);
        font-weight: 800;
        letter-spacing: 1px;
        color: #ff6b6b;
        text-shadow: 0 4px 28px rgba(0, 0, 0, 0.7);
        user-select: none;
        will-change: transform, opacity;
      }
      .floating-reaction {
        position: fixed;
        bottom: -48px;
        font-size: 34px;
        line-height: 1;
        user-select: none;
        will-change: transform, opacity;
      }
      /* A floating ball reaction is a flat filled disc, drawn just like the
         on-screen ball. Its pixel size is set from the live canvas so it matches. */
      .floating-ball {
        position: fixed;
        bottom: -48px;
        border-radius: 50%;
        user-select: none;
        will-change: transform, opacity;
      }
      #overlay {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(6, 9, 18, 0.92);
        backdrop-filter: blur(2px);
      }
      #joinForm {
        display: flex;
        flex-direction: column;
        gap: 12px;
        align-items: stretch;
        width: min(86vw, 280px);
        text-align: center;
      }
      #joinForm input {
        font: inherit;
        padding: 10px 12px;
        border-radius: 6px;
        border: 1px solid #2a3550;
        background: #0b1020;
        color: #e8eefc;
        text-align: center;
      }
      #colorPicker {
        display: flex;
        gap: 8px;
        justify-content: center;
        padding: 4px 0;
      }
      #colorPicker .swatch {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        border: 2px solid transparent;
        padding: 0;
        cursor: pointer;
        transition: border-color 0.15s;
      }
      #colorPicker .swatch:hover {
        border-color: #9fb0d8;
      }
      #colorPicker .swatch.selected {
        border-color: #e8eefc;
        box-shadow: 0 0 6px rgba(232, 238, 252, 0.4);
      }
      /* Fatalities opt-in toggle, under the board. */
      #fatalityToggle {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 13px;
        color: #6b7796;
        user-select: none;
        cursor: pointer;
      }
      #fatalityToggle input {
        accent-color: #ff6b6b;
        cursor: pointer;
      }
      #fatalityToggle:hover {
        color: #9fb0d8;
      }
    </style>
  </head>
  <body>
    <h1>T S O N G</h1>
    <div class="arena">
      <div id="stage">
        <canvas id="game" width="800" height="500"></canvas>
        <div id="status"></div>
        <button id="join" style="display: none">Join game</button>
        <label id="modeToggle" title="Each paddle hit drags both paddles toward center. Applies at the next match.">
          <input type="checkbox" id="closingMode" disabled /> Closing walls
        </label>
        <div id="watchers"></div>
        <label id="fatalityToggle" title="When on, win a match to perform a finishing move">
          <input type="checkbox" id="fatalityCheck" />
          Fatalities
        </label>
        <button id="rename" class="link" style="display: none">change name</button>
        <div id="leaderboard"></div>
      </div>

      <div id="chat">
        <h2>Chat</h2>
        <div id="chatlog"></div>
        <form id="chatForm">
          <input id="chatInput" maxlength="200" placeholder="say something…" autocomplete="off" disabled />
        </form>
        <div id="reactions"></div>
        <div id="recentReactions"></div>
        <div id="ballReaction"></div>
      </div>
    </div>

    <div id="reactionLayer" aria-hidden="true"></div>

    <div id="overlay">
      <form id="joinForm">
        <h1>T S O N G</h1>
        <input id="nick" maxlength="20" placeholder="enter a nickname" autocomplete="off" autofocus />
        <div id="colorPicker">
          <button class="swatch selected" data-color="#e8eefc" style="background:#e8eefc" type="button"></button>
          <button class="swatch" data-color="#ff6b6b" style="background:#ff6b6b" type="button"></button>
          <button class="swatch" data-color="#51cf66" style="background:#51cf66" type="button"></button>
          <button class="swatch" data-color="#339af0" style="background:#339af0" type="button"></button>
          <button class="swatch" data-color="#fcc419" style="background:#fcc419" type="button"></button>
          <button class="swatch" data-color="#cc5de8" style="background:#cc5de8" type="button"></button>
          <button class="swatch" data-color="#ff922b" style="background:#ff922b" type="button"></button>
          <button class="swatch" data-color="#20c997" style="background:#20c997" type="button"></button>
        </div>
        <button type="submit">Enter</button>
      </form>
    </div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
